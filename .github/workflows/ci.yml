name: Petclinic CI with JFrog
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: petclinic
      IMAGE_TAG: 1.1.0
      BUILD_NAME: petclinic-build
      BUILD_NUMBER: ${{ github.run_number }}
      MODULE_NAME: petclinic-module
      PLATFORM_REPO: jay-maven-dev-virtual
      # Host-only for Docker login
      JFROG_URL: psblr.jfrog.io
      # Full URL (include scheme) for JFrog CLI config and mvn-config
      JF_URL: https://psblr.jfrog.io
      DOCKER_REPO: petclinic-docker-local
      JFROG_CLI_LOG_LEVEL: INFO

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup JFrog CLI
      uses: jfrog/setup-jfrog-cli@v4
      env:  
           JF_URL: https://psblr.jfrog.io
           #JF_USER: ${{ vars.JF_USER }}
           #JF_ACCESS_TOKEN: ${{ vars.JF_ACCESS_TOKEN }}                  
      with:
           oidc-provider-name: destgithub

    - name: Check connectivity
      run: |
        jf config show
        jf rt ping

    - name: Configure Maven with JFrog Artifactory
      run:
        jf mvnc --repo-deploy-releases=$PLATFORM_REPO --repo-deploy-snapshots=$PLATFORM_REPO --repo-resolve-releases=$PLATFORM_REPO --repo-resolve-snapshots=$PLATFORM_REPO
        
        # set -euxo pipefail
        # mkdir -p jfrog-maven
        # echo "=== mvn-config result, listing ~/.m2 ==="
        # ls -la ~/.m2 || true
        # echo "=== generated settings.xml ==="
        # cat ~/.m2/settings.xml || true
        # cp ~/.m2/settings.xml jfrog-maven/settings.xml || true 
        
    # - name: Verify Maven Config
    #   run: |
    #     echo "===== settings.xml ====="
    #     cat jfrog-maven/settings.xml || true
    # - name: Maven Build with JFrog
    #   # working-directory: "${{ github.workspace }}"
    #   run: |
    #     jf mvn clean package -DskipTests \
    #       --settings ./jfrog-maven/settings.xml \
    #       --build-name=${BUILD_NAME} \
    #       --build-number=${BUILD_NUMBER}

    - name: Mvn Clean Install
      run: |
           jf mvn clean install -U -X --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER --module $MODULE_NAME
           
    - name: Docker Login to Artifactory
      uses: docker/login-action@v2
      with:
        registry: ${{ env.JFROG_URL }}
        username: ${{ secrets.JFROG_USER }}
        password: ${{ secrets.JFROG_TOKEN }}

    - name: Docker Build
      working-directory: "${{ github.workspace }}"
      run: |
        jfrog docker build \
          --build-name=${BUILD_NAME} \
          --build-number=${BUILD_NUMBER} \
          -t ${JFROG_URL}/${DOCKER_REPO}/${IMAGE_NAME}:${IMAGE_TAG} .
    - name: Docker Push
      run: docker push ${JFROG_URL}/${DOCKER_REPO}/${IMAGE_NAME}:${IMAGE_TAG}

    - name: Publish Build Info
      run: |
        jfrog rt build-publish ${BUILD_NAME} ${BUILD_NUMBER}
    - name: Inspect published build-info
      run: |
        echo "=== Published build-info ==="
        jfrog rt curl -X GET /api/build/${BUILD_NAME}/${BUILD_NUMBER} || true
    - name: Xray Scan
      run: |
        jfrog build-scan ${BUILD_NAME} ${BUILD_NUMBER} --vuln --format json

    - name: Docker Image Scan
      run: |
        jfrog docker scan ${JFROG_URL}/${DOCKER_REPO}/${IMAGE_NAME}:${IMAGE_TAG} --vuln --format json
